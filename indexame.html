<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onix Manager - Asesoría Digital y Financiera</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }
        .container img {
            width: 100%;
            height: auto; /* Ajusta la altura automáticamente para evitar distorsiones */
            max-height: 300px; /* Limita la altura máxima */
            object-fit: contain; /* Mantiene la proporción del GIF sin cortar la cabeza */
            border-radius: 10px;
            margin-bottom: 20px;
            display: block; /* Evita el espacio adicional debajo de la imagen */
        }
        h1 {
            font-size: 3em;
            margin: 10px 0 20px;
        }
        h2 {
            font-size: 1.8em;
            margin: 10px 0;
            color: #aaa;
        }
        p {
            font-size: 1.1em;
            margin: 20px 0;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2em;
            color: #000;
            background-color: #ffa500;
            border: 2px solid #ffa500;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        .cta-button:hover {
            background-color: #ff7f00;
            border-color: #ff7f00;
            color: #fff;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5em;
            }
            h2 {
                font-size: 1.5em;
            }
            p {
                font-size: 1em;
            }
            .cta-button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="InShot_20240622_052720557.gif" alt="GIF Descriptivo">
        <h1>Onix Manager</h1>
        <h2>Asesoría Digital y Financiera</h2>
        <p>Somos expertos en la creación de soluciones digitales y en el asesoramiento financiero descentralizado. Nuestra misión es ayudarte a alcanzar tus objetivos a través de servicios personalizados y de alta calidad.</p>
        <a href="https://calendly.com/onixmanager/consultoria" class="cta-button">Reserva tu Consultoría Gratis</a>
    </div>
</body>
</html>
