<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onix Manager - Asesoría Digital y Financiera</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0; /* Cambio de fondo a un blanco grisáceo */
            color: #333; /* Cambio de color de texto para mayor contraste */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            background-color: #fff; /* Cambio de fondo del contenedor a blanco */
            border-radius: 10px; /* Bordes redondeados para el contenedor */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Sombra suave para efecto de elevación */
        }
        .container img {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover; /* Ajusta la imagen para cubrir el contenedor */
            border-radius: 50%; /* Bordes redondeados para hacer un círculo */
            display: block;
            margin-bottom: 20px;
            object-position: center top; /* Centra la imagen verticalmente manteniendo la cabeza visible */
        }
        h1 {
            font-size: 3em;
            margin: 10px 0 20px;
        }
        h2 {
            font-size: 1.8em;
            margin: 10px 0;
            color: #888; /* Color de subtítulo más suave */
        }
        p {
            font-size: 1.1em;
            margin: 20px 0;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2em;
            color: #fff;
            background-color: #007bff; /* Color de fondo del botón azul */
            border: 2px solid #007bff; /* Borde del botón azul */
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        .cta-button:hover {
            background-color: #0056b3; /* Color de fondo del botón al pasar el ratón */
            border-color: #0056b3; /* Color del borde del botón al pasar el ratón */
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5em;
            }
            h2 {
                font-size: 1.5em;
            }
            p {
                font-size: 1em;
            }
            .cta-button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Vidnoz_AI_Headshots.png" alt="GIF Descriptivo">
        <h1>Onix Manager</h1>
        <h2>Asesoría Digital y Financiera</h2>
        <p>Soy experto en la creación de soluciones digitales y en el asesoramiento financiero descentralizado. Mi misión es ayudarte a alcanzar tus objetivos a través de servicios personalizados y de alta calidad.</p>
        <a href="https://calendly.com/onixmanager/consultoria" class="cta-button">Reserva tu Consultoría Gratis</a>
    </div>
</body>
</html>
